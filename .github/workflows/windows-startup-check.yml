name: Windows Startup Check

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  windows-startup:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start services with run.bat
        shell: cmd
        run: run.bat start

      - name: Wait for backend
        shell: powershell
        run: |
          $ok = $false
          for ($i = 0; $i -lt 40; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8000/api/health" -UseBasicParsing -TimeoutSec 2
              if ($resp.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
            Start-Sleep -Seconds 2
          }
          if (-not $ok) {
            Write-Host "=== netstat ==="
            cmd /c "netstat -ano | findstr :8000"
            Write-Host "=== .run files ==="
            Get-ChildItem -Path ".run" -ErrorAction SilentlyContinue | Format-Table -AutoSize
            Write-Host "=== backend.log ==="
            if (Test-Path ".run\backend.log") { Get-Content ".run\backend.log" -Tail 200 }
            Write-Host "=== backend.err.log ==="
            if (Test-Path ".run\backend.err.log") { Get-Content ".run\backend.err.log" -Tail 200 }
            throw "Backend health check failed"
          }

      - name: Wait for frontend
        shell: powershell
        run: |
          $ok = $false
          for ($i = 0; $i -lt 40; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:5173/" -UseBasicParsing -TimeoutSec 2
              if ($resp.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
            Start-Sleep -Seconds 2
          }
          if (-not $ok) {
            Write-Host "=== netstat ==="
            cmd /c "netstat -ano | findstr :5173"
            Write-Host "=== frontend.log ==="
            if (Test-Path ".run\frontend.log") { Get-Content ".run\frontend.log" -Tail 200 }
            Write-Host "=== frontend.err.log ==="
            if (Test-Path ".run\frontend.err.log") { Get-Content ".run\frontend.err.log" -Tail 200 }
            throw "Frontend check failed"
          }

      - name: Stop services
        if: always()
        shell: cmd
        run: run.bat stop
